apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: mesh-demo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: billing-sa
  namespace: mesh-demo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rogue-sa
  namespace: mesh-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing
  namespace: mesh-demo
  labels:
    app: billing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing
  template:
    metadata:
      labels:
        app: billing
    spec:
      serviceAccountName: billing-sa
      containers:
        - name: billing
          image: mendhak/http-https-echo:31
          ports:
            - containerPort: 8080
          env:
            - name: HTTP_PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: billing
  namespace: mesh-demo
spec:
  selector:
    app: billing
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mesh-demo
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: frontend-sa
      containers:
        - name: client
          image: curlimages/curl:8.8.0
          command: ["sh", "-c", "sleep 365d"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rogue
  namespace: mesh-demo
  labels:
    app: rogue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rogue
  template:
    metadata:
      labels:
        app: rogue
    spec:
      serviceAccountName: rogue-sa
      containers:
        - name: client
          image: curlimages/curl:8.8.0
          command: ["sh", "-c", "sleep 365d"]
